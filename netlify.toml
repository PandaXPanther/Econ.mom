# Netlify build & deploy configuration for The Mother of Econ.
# Static frontend served from dist/public; serverless functions handle /api/*.

[build]
  command = "npm run build"
  publish = "dist/public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Route /api/grade-frq to the Netlify Function of the same name.
[[redirects]]
  from = "/api/grade-frq"
  to   = "/.netlify/functions/grade-frq"
  status = 200
  force  = true

# FRED proxy (hides FRED_API_KEY).
[[redirects]]
  from = "/api/fred"
  to   = "/.netlify/functions/fred"
  status = 200
  force  = true

# Gemini FRQ generator.
[[redirects]]
  from = "/api/generate-frq"
  to   = "/.netlify/functions/generate-frq"
  status = 200
  force  = true

# Gemini multimodal graph grader.
[[redirects]]
  from = "/api/grade-graph"
  to   = "/.netlify/functions/grade-graph"
  status = 200
  force  = true

# NBER working-paper feed for Natural Experiments tool.
[[redirects]]
  from = "/api/nber-feed"
  to   = "/.netlify/functions/nber-feed"
  status = 200
  force  = true

# Gemini-powered TariffLab sector data fetcher.
[[redirects]]
  from = "/api/tariff-sector-data"
  to   = "/.netlify/functions/tariff-sector-data"
  status = 200
  force  = true

# Gemini-powered shock interpreter for ShockSim.
[[redirects]]
  from = "/api/gemini-shock"
  to   = "/.netlify/functions/gemini-shock"
  status = 200
  force  = true

# Gemini-powered news translator with numbers, analog, forecast.
[[redirects]]
  from = "/api/gemini-news"
  to   = "/.netlify/functions/gemini-news"
  status = 200
  force  = true

# Gemini-powered paper decoder (URL or pasted text).
[[redirects]]
  from = "/api/gemini-paper"
  to   = "/.netlify/functions/gemini-paper"
  status = 200
  force  = true

# Gemini-powered counterfactual scenario generator.
[[redirects]]
  from = "/api/gemini-scenario"
  to   = "/.netlify/functions/gemini-scenario"
  status = 200
  force  = true

# Gemini-powered EconLever preset suggester.
[[redirects]]
  from = "/api/gemini-preset"
  to   = "/.netlify/functions/gemini-preset"
  status = 200
  force  = true

# Gemini-powered inflation deep explanation.
[[redirects]]
  from = "/api/gemini-inflation-explain"
  to   = "/.netlify/functions/gemini-inflation-explain"
  status = 200
  force  = true

# SPA fallback for hash-routed React app.
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
